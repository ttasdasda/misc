<svg width="21" height="21" viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg">
<g transform="translate(4, 0)">
    <!-- Right Mouse Button Fill (Mathematically excludes the scroll wheel) -->
    <path d="M 6.5 1 A 6.5 6.5 0 0 1 13 7.5 L 13 10.0 L 6.5 10.0 L 6.5 6.5 A 1.3 1.3 0 0 0 7.8 5.2 L 7.8 4.3 A 1.3 1.3 0 0 0 6.5 3.0 Z" fill="#9c9898"/>
    
    <!-- Outer Mouse Body -->
    <rect x="0" y="1" width="13" height="19" rx="6.5" fill="none" stroke="#575757" stroke-width="2"/>
    
    <!-- Horizontal Bar -->
    <line x1="0" y1="10.0" x2="13" y2="10.0" stroke="#575757" stroke-width="2"/>
    
    <!-- Scroll Wheel -->
    <rect x="5.2" y="3" width="2.6" height="3.5" rx="1.3" fill="none" stroke="#575757" stroke-width="1.8"/>
    
    <!-- Vertical Upper Line -->
    <line x1="6.5" y1="1" x2="6.5" y2="3" stroke="#575757" stroke-width="2"/>
    
    <!-- Vertical Lower Line -->
    <line x1="6.5" y1="6.5" x2="6.5" y2="10.0" stroke="#575757" stroke-width="2"/>
</g>
</svg>
