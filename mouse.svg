<svg width="13" height="21" viewBox="0 0 13 21" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Outer Mouse Body -->
    <rect x="0" y="1" width="13" height="19" rx="6.5" fill="none" stroke="#575757" stroke-width="2"/>
    <!-- Horizontal Bar -->
    <line x1="0" y1="10.0" x2="13" y2="10.0" stroke="#575757" stroke-width="2"/>
    <!-- Scroll Wheel -->
    <rect x="5.2" y="3" width="2.6" height="3.5" rx="1.3" fill="none" stroke="#575757" stroke-width="1.8"/>
    <!-- Vertical Upper Line -->
    <line x1="6.5" y1="1" x2="6.5" y2="3" stroke="#575757" stroke-width="2"/>
    <!-- Vertical Lower Line -->
    <line x1="6.5" y1="6.5" x2="6.5" y2="10.0" stroke="#575757" stroke-width="2"/>
</svg>
